/*
 * This file was generated by the Gradle 'init' task.
 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'java'
    id 'war'

}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    implementation 'jakarta.servlet.jsp.jstl:jakarta.servlet.jsp.jstl-api:3.0.0'
    implementation 'org.glassfish.web:jakarta.servlet.jsp.jstl:3.0.1'
    implementation libs.org.jdbi.jdbi3.core
    implementation libs.com.mysql.mysql.connector.j
    implementation libs.at.favre.lib.bcrypt
    implementation libs.com.sun.mail.jakarta.mail
    implementation libs.commons.fileupload.commons.fileupload
    implementation libs.commons.io.commons.io
    implementation libs.com.fasterxml.jackson.core.jackson.databind
    implementation libs.org.apache.poi.poi
    implementation libs.org.apache.poi.poi.ooxml
    implementation libs.org.apache.xmlbeans.xmlbeans
    implementation libs.org.apache.pdfbox.pdfbox
    implementation libs.com.google.code.gson.gson
    testImplementation libs.org.junit.jupiter.junit.jupiter.api
    testImplementation libs.org.junit.jupiter.junit.jupiter.engine
    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'
}

group = 'com.example'
version = '1.0-SNAPSHOT'
description = 'eBookStoreFullProject'
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}

war {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
        resources {
            srcDirs = ['src/main/resources']
        }
    }
}
